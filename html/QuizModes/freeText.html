<div id="freeTextWrapper">
    <div class="questionSection">
        <label id="freeTextQuestion" class="questionText"></label>
    </div>
    
    <div class="answerSection">
        <input 
            type="text" 
            id="freeTextAnswer" 
            placeholder="Type your answer here..."
            autocomplete="off"
        />
    </div>
    
    <div class="buttonSection">
        <button id="freeTextSubmit" class="submitButton">Submit Answer</button>
    </div>
</div>
